[org/mate/caja/desktop]
home-icon-name='Benutzer-Verzeichnis'
volumes-visible=false

[org/mate/caja/list-view]
default-column-order=['name', 'size', 'type', 'date_modified', 'owner', 'date_created', 'extension', 'group', 'size_on_disk', 'mime_type', 'octal_permissions', 'where', 'selinux_context', 'date_accessed', 'permissions']
default-visible-columns=['name', 'size', 'type', 'date_modified']

[org/mate/caja/preferences]
always-use-location-entry=true
background-color='#000000'
confirm-trash=true
ctrl-tab-switch-tabs=true
date-format='iso'
enable-delete=true
preview-sound='always'
show-advanced-permissions=true
show-backup-files=true
show-directory-item-counts='always'
show-icon-text='always'
show-image-thumbnails='always'
side-pane-background-color='#000000'
thumbnail-limit=uint64 104857600

[org/mate/caja/window-state]
maximized=false
sidebar-width=202
start-with-sidebar=true
start-with-status-bar=true
start-with-toolbar=true